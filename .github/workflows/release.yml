name: Build and Release APK

on:
  push:
    branches: [ master, 'release/*' ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission to gradlew
      run: chmod +x gradlew

    - name: Build with Gradle (with retry, warnings disabled)
      run: |
        export GRADLE_OPTS="-Dorg.gradle.jvmargs=-Xmx2048m -Dorg.gradle.daemon=false"
        ./gradlew build --warning-mode none || ./gradlew build --warning-mode none

    - name: Assemble Debug APK
      run: ./gradlew assembleDebug --warning-mode none

    - name: Assemble Release APK
      run: ./gradlew assembleRelease --warning-mode none

    - name: Install Build Tools via SDK Manager
      run: |
        export ANDROID_HOME=/usr/local/lib/android/sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/tools/bin
        yes | sdkmanager "build-tools;29.0.3"

    - name: List Release APK Files (Debug)
      run: |
        echo "=== Release APK Directory ==="
        ls -la app/build/outputs/apk/release/ || echo "Directory not found"
        find app/build/outputs -name "*.apk" || echo "No APK files found"

    - name: Sign Release APK
      id: sign_release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/'))
      uses: r0adkll/sign-android-release@v1
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.APK_KEY_STORE }}
        alias: ${{ secrets.KEYSTORE_ALIAS }}
        keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_STORE_PASSWORD }}

    - name: List Signed APK Files (Debug)
      if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/'))
      run: |
        echo "=== After Signing ==="
        ls -la app/build/outputs/apk/release/ || echo "Directory not found"
        find app/build/outputs -name "*-signed.apk" || echo "No signed APK files found"

    - name: Upload APK artifact (PR)
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: joyman-pr-${{ github.run_number }}
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Create CI Release (master/release push)
      if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/'))
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ci/auto-build-${{ github.run_number }}
        name: 🤖 JoyMan CI Build #${{ github.run_number }}
        files: |
          app/build/outputs/apk/debug/app-debug.apk
          ${{ steps.sign_release.outputs.signedReleaseFile }}
        prerelease: true
        generate_release_notes: true
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          ## 🤖 自动构建版本
          
          **构建编号:** ${{ github.run_number }}
          **提交:** ${{ github.sha }}
          **时间:** ${{ github.event.head_commit.timestamp }}
          
          ---
          ### 📦 下载
          - **Debug 版**: `app-debug.apk` (自动签名，仅供测试)
          - **Release 版**: 签名后的 APK (正式签名，可覆盖安装)
          
          ⚠️ Release 版本使用正式证书签名，支持覆盖安装和正式分发。
          
          ### 🔗 下载方式
          点击上方的文件即可下载，**无需登录**。